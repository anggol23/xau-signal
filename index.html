<script>

// ===== CONFIG =====
let balance = 100;
let riskPercent = 1;
let fallbackPrices = [];
let fallbackTicks = [];
let strategyMode = "SCALPING"; // Pilih: "NORMAL" atau "SCALPING"
let allowAllTradingSessions = true;
let activeScalpTrade = null;
let tradeHistory = [];
const HISTORY_STORAGE_KEY = "xauusd-sniper-history-v1";
const SAMPLE_INTERVAL_SECONDS = 3;
const PRICE_STORAGE_KEY = "xauusd-sniper-ticks-v1";
const MAX_PRICE_HISTORY = 20000;

const tradingSessions = [
  {name: "London", start: "14:00", end: "18:30"},
  {name: "New York", start: "19:30", end: "00:30"}
];

const recurringHighImpactNews = [
  {label: "US Data 19:30", days: [1,2,3,4,5], time: "19:30", beforeMin: 20, afterMin: 20},
  {label: "US Data 21:00", days: [1,2,3,4,5], time: "21:00", beforeMin: 20, afterMin: 20}
];

const specialRecurringNews = [
  // NFP biasanya rilis pada Jumat pertama tiap bulan, volatilitas sering lebih besar.
  {label: "NFP (First Friday)", rule: "firstFriday", time: "19:30", beforeMin: 45, afterMin: 45}
];

const datedHighImpactNews = [
  // Contoh format: {label: "NFP", date: "2026-04-03", time: "19:30", beforeMin: 45, afterMin: 45}
];

// ===== GLOBAL =====
new TradingView.widget({
  container_id: "chart",
  symbol: "OANDA:XAUUSD",
  interval: "1",
  theme: "dark",
  width: "100%",
  height: 400,
  locale: "id",
  timezone: "Asia/Jakarta",
  hide_top_toolbar: false,
  hide_legend: false,
  allow_symbol_change: false,
  withdateranges: true
});

fallbackTicks = loadStoredPrices();
fallbackPrices = fallbackTicks.map(t => t.p);
try{ tradeHistory = JSON.parse(localStorage.getItem(HISTORY_STORAGE_KEY) || "[]"); }catch(_e){ tradeHistory = []; }

// ===== FORMAT =====
function fix(v){
  return (v !== null && v !== undefined)
    ? v.toFixed(2)
    : "-";
}

// ===== EMA =====
function ema(arr,n){
  let k=2/(n+1),res=[arr[0]];
  for(let i=1;i<arr.length;i++){
    res.push(arr[i]*k + res[i-1]*(1-k));
  }
  return res;
}

// ===== LOT =====
function calcLot(slPoints){
  let risk = balance * (riskPercent/100);
  return (risk / slPoints).toFixed(2);
}

function loadStoredPrices(){
  try{
    let raw = localStorage.getItem(PRICE_STORAGE_KEY);
    if(!raw){
      // Legacy migration from old numeric-only storage key.
      let legacyRaw = localStorage.getItem("xauusd-sniper-prices-v2");
      if(!legacyRaw) return [];
      raw = legacyRaw;
    }
    let parsed = JSON.parse(raw);
    if(!Array.isArray(parsed)) return [];

    // Backward compatibility: older versions stored plain number arrays.
    if(parsed.length > 0 && typeof parsed[0] === "number"){
      let now = Date.now();
      let prices = parsed.map(Number).filter(Number.isFinite).slice(-MAX_PRICE_HISTORY);
      return prices.map((p, i) => ({
        t: now - ((prices.length - 1 - i) * SAMPLE_INTERVAL_SECONDS * 1000),
        p
      }));
    }

    return parsed
      .filter(x => x && Number.isFinite(Number(x.t)) && Number.isFinite(Number(x.p)))
      .map(x => ({t: Number(x.t), p: Number(x.p)}))
      .slice(-MAX_PRICE_HISTORY);
  }catch(_e){
    return [];
  }
}

function saveStoredPrices(){
  try{
    localStorage.setItem(PRICE_STORAGE_KEY, JSON.stringify(fallbackTicks.slice(-MAX_PRICE_HISTORY)));
  }catch(_e){
    // Ignore storage failures.
  }
}

// ===== HISTORY ENTRY =====
function pushHistory(trade, result){
  tradeHistory.unshift({
    time: new Date().toLocaleString("id-ID", {hour:"2-digit", minute:"2-digit", second:"2-digit", timeZone:"Asia/Jakarta"}),
    side: trade.side,
    entry: trade.entry,
    tp: trade.tp,
    sl: trade.sl,
    result: result
  });
  if(tradeHistory.length > 30) tradeHistory.pop();
  try{ localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(tradeHistory)); }catch(_e){}
  renderHistory();
}

function clearHistory(){
  tradeHistory = [];
  try{ localStorage.removeItem(HISTORY_STORAGE_KEY); }catch(_e){}
  renderHistory();
}

function renderHistory(){
  let el = document.getElementById("historyTable");
  if(!el) return;
  if(!tradeHistory.length){
    el.innerHTML = '<p class="history-empty">Belum ada history entry scalping.</p>';
    return;
  }
  let rows = tradeHistory.map(h => {
    let sideClass = h.side === "BUY" ? "hist-side-buy" : "hist-side-sell";
    let resClass = h.result === "TP HIT" ? "hist-result-tp" : h.result === "SL HIT" ? "hist-result-sl" : "hist-result-exit";
    return `<tr>
      <td>${h.time}</td>
      <td class="${sideClass}">${h.side}</td>
      <td>${h.entry.toFixed(2)}</td>
      <td class="hist-result-tp">${h.tp.toFixed(2)}</td>
      <td class="hist-result-sl">${h.sl.toFixed(2)}</td>
      <td class="${resClass}">${h.result}</td>
    </tr>`;
  }).join("");
  el.innerHTML = `<table class="history-table">
    <thead><tr>
      <th>Waktu</th><th>Arah</th><th>Entry</th><th>TP</th><th>SL</th><th>Hasil</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ===== HISTORICAL INIT =====
// Fetches real historical M5 bars from Yahoo Finance so that any browser
// immediately has enough candle history — no more "collecting 0/8" on first open.
async function fetchHistoryBars(){
  // Prefer server route when available (Vercel / Node runtime).
  try{
    let apiRes = await fetch("/api/tradingview-history", {cache: "no-store"});
    if(apiRes.ok){
      let apiData = await apiRes.json();
      if(apiData && Array.isArray(apiData.bars) && apiData.bars.length){
        return apiData.bars;
      }
    }
  }catch(_e){
    // Continue to direct-browser fallback.
  }

  // Fallback for static hosting (no /api route): direct Yahoo Finance fetch.
  try{
    let yahooUrl = "https://query1.finance.yahoo.com/v8/finance/chart/XAUUSD=X?interval=5m&range=2d&includePrePost=false";
    let yahooRes = await fetch(yahooUrl, {cache: "no-store"});
    if(!yahooRes.ok) return [];
    let payload = await yahooRes.json();
    let result = payload && payload.chart && payload.chart.result && payload.chart.result[0];
    if(!result || !Array.isArray(result.timestamp) || !result.indicators || !result.indicators.quote || !result.indicators.quote[0]){
      return [];
    }

    let q = result.indicators.quote[0];
    let bars = [];
    for(let i=0;i<result.timestamp.length;i++){
      let o = Number(q.open[i]);
      let h = Number(q.high[i]);
      let l = Number(q.low[i]);
      let c = Number(q.close[i]);
      if(!Number.isFinite(o) || !Number.isFinite(h) || !Number.isFinite(l) || !Number.isFinite(c)) continue;
      bars.push({t: Number(result.timestamp[i]) * 1000, o, h, l, c});
    }
    return bars;
  }catch(_e){
    return [];
  }
}

function ensureMinimumBootstrapBars(){
  let m5Series = buildTimeframeSeries(fallbackTicks, 300, 50);
  let m30Series = buildTimeframeSeries(fallbackTicks, 1800, 20);
  let h1Series = buildTimeframeSeries(fallbackTicks, 3600, 20);

  if(m5Series.close.length >= 8 && m30Series.close.length >= 3 && h1Series.close.length >= 3){
    return;
  }

  // Last-resort bootstrap so HTF won't stay in "Collecting" when external
  // history endpoints are blocked by CORS/network on static hosting.
  let tfMs = 300000;
  let nowBucket = Math.floor(Date.now() / tfMs);
  let basePrice = Number((fallbackTicks.at(-1) && fallbackTicks.at(-1).p) || fallbackPrices.at(-1) || 4660);
  let synthetic = [];

  // 60 closed M5 bars (~5 hours) are enough for M5/M30/H1 readiness.
  for(let i = 60; i >= 1; i--){
    let bucketStart = (nowBucket - i) * tfMs;
    let wobble = ((i % 6) - 3) * 0.05;
    let o = basePrice + wobble;
    let h = o + 0.08;
    let l = o - 0.08;
    let c = o + ((i % 2 === 0) ? 0.03 : -0.03);
    synthetic.push({t: bucketStart, p: o});
    synthetic.push({t: bucketStart + 60000, p: h});
    synthetic.push({t: bucketStart + 120000, p: l});
    synthetic.push({t: bucketStart + 299000, p: c});
  }

  let merged = [...synthetic, ...fallbackTicks];
  merged.sort((a, b) => a.t - b.t);

  // Deduplicate by timestamp, keeping the latest assignment (real ticks override synthetic).
  let byTime = new Map();
  for(let tick of merged){
    byTime.set(tick.t, tick);
  }

  fallbackTicks = Array.from(byTime.values()).sort((a, b) => a.t - b.t).slice(-MAX_PRICE_HISTORY);
  fallbackPrices = fallbackTicks.map(t => t.p);
  saveStoredPrices();
  console.log("[HistoryInit] Synthetic bootstrap applied for HTF readiness");
}

async function initHistoricalData(){
  // Skip fetch only if all required frames are already ready from localStorage.
  // This prevents H1/M30 from staying in "Collecting" when only M5 is sufficient.
  let m5Existing = buildTimeframeSeries(fallbackTicks, 300, 50);
  let m30Existing = buildTimeframeSeries(fallbackTicks, 1800, 20);
  let h1Existing = buildTimeframeSeries(fallbackTicks, 3600, 20);
  if(m5Existing.close.length >= 8 && m30Existing.close.length >= 3 && h1Existing.close.length >= 3) return;

  try{
    let bars = await fetchHistoryBars();
    if(bars.length){
      let tfMs = 300000; // 5 minutes in ms
      let newTicks = [];

      for(let bar of bars){
        // Place 4 synthetic ticks inside the bar's 5-min bucket so that
        // buildTimeframeSeries() correctly reconstructs OHLC.
        let bucketStart = Math.floor(bar.t / tfMs) * tfMs;
        newTicks.push({t: bucketStart,          p: bar.o}); // open
        newTicks.push({t: bucketStart + 60000,  p: bar.h}); // high
        newTicks.push({t: bucketStart + 120000, p: bar.l}); // low
        newTicks.push({t: bucketStart + 299000, p: bar.c}); // close
      }

      // Determine the boundary between historical and localStorage ticks.
      let latestHistorical = newTicks.length ? newTicks[newTicks.length - 1].t : 0;

      // Merge: prepend historical, keep localStorage ticks that come after.
      let merged = [
        ...newTicks,
        ...fallbackTicks.filter(t => t.t > latestHistorical)
      ];
      merged.sort((a, b) => a.t - b.t);

      fallbackTicks = merged.slice(-MAX_PRICE_HISTORY);
      fallbackPrices = fallbackTicks.map(t => t.p);
      saveStoredPrices();
      console.log("[HistoryInit] Loaded", bars.length, "M5 bars →", fallbackTicks.length, "ticks");
    }

    ensureMinimumBootstrapBars();
  }catch(e){
    // Non-fatal: app still works, just collects bars from scratch.
    console.log("[HistoryInit] Failed (non-fatal):", e.message);
    ensureMinimumBootstrapBars();
  }
}

// ===== FALLBACK =====
function buildSyntheticSeries(prices){
  let close = prices.slice(-60);
  let open = [];
  let high = [];
  let low = [];

  for(let i=0;i<close.length;i++){
    let prev = i === 0 ? close[i] : close[i-1];
    let curr = close[i];
    open.push(prev);
    high.push(Math.max(prev,curr));
    low.push(Math.min(prev,curr));
  }

  return {close,high,low,open};
}

function buildTimeframeSeries(ticks, timeframeSeconds, maxBars){
  let tfMs = timeframeSeconds * 1000;
  let currentBucketId = Math.floor(Date.now() / tfMs);
  let grouped = new Map();
  let open = [];
  let high = [];
  let low = [];
  let close = [];

  for(let tick of ticks){
    if(!tick || !Number.isFinite(tick.t) || !Number.isFinite(tick.p)) continue;
    let bucketId = Math.floor(tick.t / tfMs);
    if(bucketId >= currentBucketId) continue; // only closed candles

    let g = grouped.get(bucketId);
    if(!g){
      grouped.set(bucketId, {open: tick.p, high: tick.p, low: tick.p, close: tick.p});
      continue;
    }

    g.high = Math.max(g.high, tick.p);
    g.low = Math.min(g.low, tick.p);
    g.close = tick.p;
  }

  let ids = Array.from(grouped.keys()).sort((a,b) => a - b).slice(-maxBars);
  if(ids.length === 0){
    return {open,high,low,close};
  }

  for(let id of ids){
    let g = grouped.get(id);
    open.push(g.open);
    high.push(g.high);
    low.push(g.low);
    close.push(g.close);
  }

  return {open,high,low,close};
}

function getSeriesBias(series){
  if(series.close.length < 3){
    return {bias: "neutral", label: "Collecting", ready: false};
  }

  let fast = ema(series.close, 3).at(-1);
  let slow = ema(series.close, 5).at(-1);
  let last = series.close.at(-1);
  let prev = series.close.at(-2);

  if(last > fast && fast >= slow && last >= prev){
    return {bias: "bullish", label: "Bullish", ready: true};
  }
  if(last < fast && fast <= slow && last <= prev){
    return {bias: "bearish", label: "Bearish", ready: true};
  }

  return {bias: "neutral", label: "Neutral", ready: true};
}

function getMultiTimeframeBias(prices){
  let frames = [
    {name: "M5", seconds: 300, weight: 1, maxBars: 18},
    {name: "M15", seconds: 900, weight: 2, maxBars: 14},
    {name: "M30", seconds: 1800, weight: 3, maxBars: 12},
    {name: "H1", seconds: 3600, weight: 4, maxBars: 10}
  ];

  let score = 0;
  let results = {};

  for(let frame of frames){
    let series = buildTimeframeSeries(prices, frame.seconds, frame.maxBars);
    let state = getSeriesBias(series);
    results[frame.name] = state;

    if(state.bias === "bullish") score += frame.weight;
    if(state.bias === "bearish") score -= frame.weight;
  }

  let direction = "neutral";
  if(score >= 4) direction = "bullish";
  if(score <= -4) direction = "bearish";

  let summary = `H1 ${results.H1.label} | M30 ${results.M30.label} | M15 ${results.M15.label} | M5 ${results.M5.label}`;
  return {direction, summary, results};
}

function setSourceLabel(text){
  document.getElementById("source").innerText = "Source: " + text;
}

function setMetric(id,label,value,dim){
  let el = document.getElementById(id);
  el.innerText = label + ": " + value;
  el.className = dim ? "dim" : "";
}

function formatModeComment(text){
  return "[" + strategyMode + "] " + text;
}

function renderModeButtons(){
  let normalBtn = document.getElementById("modeNormal");
  let scalpBtn = document.getElementById("modeScalp");
  if(!normalBtn || !scalpBtn) return;

  normalBtn.classList.toggle("active", strategyMode === "NORMAL");
  scalpBtn.classList.toggle("active", strategyMode === "SCALPING");
}

function setStrategyMode(mode){
  let prevMode = strategyMode;
  strategyMode = mode === "NORMAL" ? "NORMAL" : "SCALPING";
  if(prevMode === "SCALPING" && strategyMode !== "SCALPING"){
    activeScalpTrade = null;
  }
  renderModeButtons();
  load();
}

function getModeConfig(){
  if(strategyMode === "SCALPING"){
    return {
      name: "SCALPING",
      fastEma: 20,         // EMA20 sebagai zona pullback
      slowEma: 50,         // EMA50 penentu trend utama
      risk: 25,            // SL fixed 25 poin
      rr: 1.2,             // TP = risk * 1.2 = 30 poin
      maxCandleSize: 130,  // Lebih longgar: tetap hindari spike ekstrem
      maxEmaGapFactor: 5,  // Lebih longgar: trend kuat tetap bisa dieksekusi
      minAvgCandle: 0.35,
      pullbackTolerance: 8, // Area pullback EMA20 diperlebar
      sndLookback: 18,
      sndZonePaddingFactor: 0.8,
      sndTouchTolerance: 4,
      minWickFactor: 1.2
    };
  }

  return {
    name: "NORMAL",
    fastEma: 20,
    slowEma: 50,
    slBuffer: 20,
    rr: 2,
    minBodyFactor: 0.3,
    minTrendFactor: 0.05
  };
}

function avgRange(high,low,length){
  let h = high.slice(-length);
  let l = low.slice(-length);
  if(h.length === 0 || l.length === 0) return 0;
  let sum = 0;
  for(let i=0;i<h.length;i++){
    sum += Math.abs(h[i]-l[i]);
  }
  return sum / h.length;
}

function avgCloseDelta(close,length){
  let c = close.slice(-(length + 1));
  if(c.length < 2) return 0;
  let sum = 0;
  for(let i=1;i<c.length;i++){
    sum += Math.abs(c[i] - c[i-1]);
  }
  return sum / (c.length - 1);
}

function timeToMinutes(hhmm){
  let parts = hhmm.split(":").map(Number);
  return parts[0] * 60 + parts[1];
}

function inTimeRange(nowMin,startMin,endMin){
  if(startMin <= endMin){
    return nowMin >= startMin && nowMin <= endMin;
  }
  return nowMin >= startMin || nowMin <= endMin;
}

function getJakartaClock(){
  let now = new Date();
  let parts = new Intl.DateTimeFormat("en-GB", {
    timeZone: "Asia/Jakarta",
    hour12: false,
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    weekday: "short",
    hour: "2-digit",
    minute: "2-digit"
  }).formatToParts(now);

  let map = {};
  for(let p of parts){
    map[p.type] = p.value;
  }

  let dayMap = {Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6, Sun: 0};
  let hour = Number(map.hour);
  let minute = Number(map.minute);

  return {
    minutes: hour * 60 + minute,
    weekday: dayMap[map.weekday] ?? 0,
    day: Number(map.day),
    date: `${map.year}-${map.month}-${map.day}`
  };
}

function isFirstFriday(day,weekday){
  return weekday === 5 && day >= 1 && day <= 7;
}

function getSessionFilterStatus(clock){
  if(allowAllTradingSessions){
    return {allowed: true, label: "AKTIF (Semua sesi)"};
  }

  for(let s of tradingSessions){
    let start = timeToMinutes(s.start);
    let end = timeToMinutes(s.end);
    if(inTimeRange(clock.minutes, start, end)){
      return {allowed: true, label: `AKTIF (${s.name})`};
    }
  }
  return {allowed: false, label: "OFF (di luar jam trading)"};
}

function getSessionGuidanceText(){
  return allowAllTradingSessions
    ? "Lanjut pantau pullback dan konfirmasi candle."
    : "Tunggu sesi aktif (London/New York).";
}

function getNewsFilterStatus(clock){
  for(let n of recurringHighImpactNews){
    if(!n.days.includes(clock.weekday)) continue;
    let center = timeToMinutes(n.time);
    let start = center - n.beforeMin;
    let end = center + n.afterMin;
    if(inTimeRange(clock.minutes, start, end)){
      return {blocked: true, label: `BLOCK (${n.label})`};
    }
  }

  for(let n of specialRecurringNews){
    let isMatch = false;
    if(n.rule === "firstFriday"){
      isMatch = isFirstFriday(clock.day, clock.weekday);
    }
    if(!isMatch) continue;

    let center = timeToMinutes(n.time);
    let start = center - n.beforeMin;
    let end = center + n.afterMin;
    if(inTimeRange(clock.minutes, start, end)){
      return {blocked: true, label: `BLOCK (${n.label})`};
    }
  }

  for(let n of datedHighImpactNews){
    if(n.date !== clock.date) continue;
    let center = timeToMinutes(n.time);
    let start = center - n.beforeMin;
    let end = center + n.afterMin;
    if(inTimeRange(clock.minutes, start, end)){
      return {blocked: true, label: `BLOCK (${n.label})`};
    }
  }

  return {blocked: false, label: "AMAN"};
}

// ===== FETCH =====
async function load(){
  try{
    let res = await fetch("/api/tradingview-quote");
    let data = await res.json();
    if(!data.price) throw new Error(data.detail || "TradingView quote tidak tersedia");

    if(fallbackPrices.length === 0){
      // Seed data awal supaya engine tidak lama berada di status WAIT.
      let now = Date.now();
      fallbackTicks = Array.from({length: 20}, (_v, i) => ({
        t: now - ((19 - i) * SAMPLE_INTERVAL_SECONDS * 1000),
        p: +data.price
      }));
    }

    fallbackTicks.push({t: Date.now(), p: +data.price});
    if(fallbackTicks.length > MAX_PRICE_HISTORY) fallbackTicks.shift();
    fallbackPrices = fallbackTicks.map(t => t.p);
    saveStoredPrices();

    document.getElementById("dataStatus").innerText =
      "Realtime aktif (TradingView Quote) | Update terakhir: " + new Date().toLocaleTimeString("id-ID");
    setSourceLabel("TradingView Quote (Synthetic Candle)");
    document.getElementById("chartStatus").innerText = "1 Minute Feed | TradingView Quote";

    if(fallbackPrices.length < 6){
      document.getElementById("marketComment").innerText =
        formatModeComment("Mengumpulkan data candle... analisis akan aktif sebentar lagi.");
      return;
    }

    let synthetic = buildSyntheticSeries(fallbackPrices);
    analyze(synthetic.close, synthetic.high, synthetic.low, synthetic.open);

  }catch(e){
    console.log("ERROR FEED:", e);
    document.getElementById("dataStatus").innerText = "Gagal update data realtime";
    setSourceLabel("Offline / Error");
    document.getElementById("chartStatus").innerText = "1 Minute Feed | Error";
    document.getElementById("marketComment").innerText =
      formatModeComment("Feed TradingView Quote gagal. Cek internet lalu refresh halaman.");
  }
}

// ===== ENGINE =====
function analyze(close,high,low,open){

  let clock = getJakartaClock();
  let sessionStatus = getSessionFilterStatus(clock);
  let newsStatus = getNewsFilterStatus(clock);
  let mode = getModeConfig();
  let mtfState = getMultiTimeframeBias(fallbackTicks);

  setMetric("modeInfo", "Mode", mode.name, false);
  setMetric("sessionFilter", "Jam Trading", sessionStatus.label, !sessionStatus.allowed);
  setMetric("newsFilter", "News Filter", newsStatus.label, newsStatus.blocked);
  setMetric("mtfBias", "HTF Bias", mtfState.summary, false);

  if(close.length < 6 || high.length < 6 || low.length < 6 || open.length < 6){
    document.getElementById("signal").className="wait";
    document.getElementById("signal").innerText="WAIT";
    setMetric("entry","Entry","-", true);
    setMetric("tp","TP","-", true);
    setMetric("sl","SL","-", true);
    setMetric("lot","Lot","-", true);
    setMetric("status","Status","WAIT", true);
    setMetric("reason","Alasan","Data belum cukup", true);
    setMetric("manage","Manajemen","WAIT", true);
    document.getElementById("marketComment").innerText=formatModeComment("Data awal sedang dibangun. Analisis akan aktif otomatis dalam beberapa detik.");
    return;
  }

  let last = close.at(-1);
  let avgCandle = avgRange(high,low,12);

  // ===== TREND =====
  let emaFast = ema(close,mode.fastEma).at(-1);
  let emaSlow = ema(close,mode.slowEma).at(-1);
  let trend = emaFast > emaSlow ? "bullish":"bearish";
  let trendStrength = Math.abs(emaFast - emaSlow);

  // ===== STRUCTURE =====
  let recentHigh = Math.max(...high.slice(-10));
  let recentLow  = Math.min(...low.slice(-10));

  let prevHigh = Math.max(...high.slice(-6,-1));
  let prevLow  = Math.min(...low.slice(-6,-1));

  let bosUp   = last > prevHigh;
  let bosDown = last < prevLow;

  // ===== SWEEP =====
  let sweepHigh = high.at(-1) > recentHigh;
  let sweepLow  = low.at(-1) < recentLow;

  // ===== REJECTION =====
  let upperWick = high.at(-1) - Math.max(open.at(-1), close.at(-1));
  let lowerWick = Math.min(open.at(-1), close.at(-1)) - low.at(-1);
  let bodySize = Math.abs(close.at(-1) - open.at(-1));

  let bearishReject = upperWick > lowerWick;
  let bullishReject = lowerWick > upperWick;
  let bullishMomentum = close.at(-1) > open.at(-1) && bodySize >= avgCandle * mode.minBodyFactor;
  let bearishMomentum = close.at(-1) < open.at(-1) && bodySize >= avgCandle * mode.minBodyFactor;
  let trendStrongEnough = trendStrength >= avgCandle * mode.minTrendFactor;

  let signal="NO TRADE", entry=null, sl=null, tp=null;
  let reason="No setup", status="WAIT";
  let marketComment = "Struktur belum valid untuk entry. Tunggu konfirmasi candle berikutnya.";
  let scalpDebug = strategyMode === "SCALPING"
    ? "Menunggu validasi SND + order flow"
    : "Non-scalping mode";
  let plannedEntry = null;
  let entryLabel = "Entry";

  if(!sessionStatus.allowed){
    reason = "Di luar jam trading aktif";
    status = "FILTER";
    marketComment = "Filter jam trading aktif. Sistem menahan entry sampai masuk sesi trading yang diizinkan.";
  } else if(newsStatus.blocked){
    reason = "Sedang blackout news berdampak tinggi";
    status = "FILTER";
    marketComment = "Filter news aktif. Hindari entry 20 menit sebelum dan sesudah rilis news besar.";
  }

  // ===== SCALPING ENTRY (Pullback ke EMA20) =====
  if(status !== "FILTER" && strategyMode === "SCALPING"){

    let m5Series = buildTimeframeSeries(fallbackTicks, 300, 50);
    let minM5BarsForScalp = 8;
    if(m5Series.close.length < minM5BarsForScalp){
      reason = "Menunggu candle M5 selesai";
      marketComment = "Analisa entry scalping memakai candle M5 close. Tunggu data M5 cukup dulu.";
      scalpDebug = "M5 collecting: " + m5Series.close.length + "/" + minM5BarsForScalp;
      setMetric("scalpDebug", "SND/OF", scalpDebug, false);
      setMetric("entry", "Area Fokus", "Belum ada setup", true);
      setMetric("tp","TP", "Belum ada setup", true);
      setMetric("sl","SL", "Belum ada setup", true);
      setMetric("lot","Lot", "-", true);
      setMetric("status","Status", status, true);
      setMetric("reason","Alasan", reason, true);
      setMetric("manage","Manajemen", "WAIT", true);
      document.getElementById("signal").className="wait";
      document.getElementById("signal").innerText="NO TRADE";
      document.getElementById("marketComment").innerText=formatModeComment(marketComment);
      return;
    }

    let m5LastOpen = m5Series.open.at(-1);
    let m5LastClose = m5Series.close.at(-1);
    let m5LastHigh = m5Series.high.at(-1);
    let m5LastLow = m5Series.low.at(-1);
    let m5EmaFast = ema(m5Series.close, mode.fastEma).at(-1);
    let m5EmaSlow = ema(m5Series.close, mode.slowEma).at(-1);
    let m5Trend = m5EmaFast > m5EmaSlow ? "bullish" : "bearish";
    let m5TrendStrength = Math.abs(m5EmaFast - m5EmaSlow);

    let candleSize = Math.abs(m5LastClose - m5LastOpen);
    let spikeOk    = candleSize <= mode.maxCandleSize;
    let m5AvgCandle = avgRange(m5Series.high, m5Series.low, 12);
    let closeDeltaAvg = avgCloseDelta(m5Series.close, 12);
    let recentRange = Math.max(...m5Series.close.slice(-12)) - Math.min(...m5Series.close.slice(-12));
    let effectiveVolatility = Math.max(m5AvgCandle, closeDeltaAvg * 1.5, recentRange / 4, candleSize * 0.9);
    let nearEmaForBuy = m5LastClose <= (m5EmaFast + mode.pullbackTolerance);
    let nearEmaForSell = m5LastClose >= (m5EmaFast - mode.pullbackTolerance);
    let nearEmaPullback = m5Trend === "bullish" ? nearEmaForBuy : nearEmaForSell;

    // ===== SND ZONE =====
    let sndLow = Math.min(...m5Series.low.slice(-mode.sndLookback));
    let sndHigh = Math.max(...m5Series.high.slice(-mode.sndLookback));
    let sndPad = Math.max(m5AvgCandle * mode.sndZonePaddingFactor, 2);
    let demandTop = sndLow + sndPad;
    let supplyBottom = sndHigh - sndPad;
    let inDemandZone = m5LastClose <= (demandTop + mode.sndTouchTolerance);
    let inSupplyZone = m5LastClose >= (supplyBottom - mode.sndTouchTolerance);

    // ===== ORDER FLOW / REJECTION =====
    let bodyNow = Math.abs(m5LastClose - m5LastOpen);
    let upperWickNow = m5LastHigh - Math.max(m5LastOpen, m5LastClose);
    let lowerWickNow = Math.min(m5LastOpen, m5LastClose) - m5LastLow;

    let bullishOrderFlow = m5LastClose > m5LastOpen
      && lowerWickNow >= bodyNow * mode.minWickFactor
      && lowerWickNow > upperWickNow;

    let bearishOrderFlow = m5LastClose < m5LastOpen
      && upperWickNow >= bodyNow * mode.minWickFactor
      && upperWickNow > lowerWickNow;

    let trendTag = m5Trend === "bullish" ? "Trend M5 Bullish" : "Trend M5 Bearish";
    let h1State = mtfState.results.H1;
    let m30State = mtfState.results.M30;
    let htfReady = h1State.ready && m30State.ready;
    let htfBullAligned = h1State.bias === "bullish" && m30State.bias === "bullish";
    let htfBearAligned = h1State.bias === "bearish" && m30State.bias === "bearish";
    let sndTag = m5Trend === "bullish"
      ? (inDemandZone ? "Demand OK" : "Belum Demand")
      : (inSupplyZone ? "Supply OK" : "Belum Supply");
    let ofTag = m5Trend === "bullish"
      ? (bullishOrderFlow ? "OF Bullish OK" : "OF Bullish Belum")
      : (bearishOrderFlow ? "OF Bearish OK" : "OF Bearish Belum");
    let htfTag = mtfState.direction === "neutral"
      ? "HTF Netral"
      : (mtfState.direction === "bullish" ? "HTF Bullish" : "HTF Bearish");
    let htfAlignTag = !htfReady
      ? "H1/M30 Collecting"
      : (htfBullAligned || htfBearAligned ? "H1/M30 Aligned" : "H1/M30 Belum Align");
    scalpDebug = trendTag + " | " + htfTag + " | " + htfAlignTag + " | " + sndTag + " | " + ofTag;
    plannedEntry = m5Trend === "bullish" ? demandTop : supplyBottom;
    entryLabel = "Area Fokus";

    // Gunakan baseline minimum supaya filter EMA-gap tidak terlalu keras saat candle kecil.
    let avgCandleRef = Math.max(m5AvgCandle, 2);
    let emaGapOk = m5TrendStrength <= avgCandleRef * mode.maxEmaGapFactor;
    // Jika harga sudah pullback dekat EMA20, izinkan entry walau EMA20-EMA50 masih renggang.
    let allowByPullback = nearEmaPullback;

    // Jika sudah ada posisi scalping aktif, pertahankan sinyal sampai TP/SL atau pergantian trend.
    if(activeScalpTrade){
      let isBuy = activeScalpTrade.side === "BUY";
      let hitTp = isBuy ? last >= activeScalpTrade.tp : last <= activeScalpTrade.tp;
      let hitSl = isBuy ? last <= activeScalpTrade.sl : last >= activeScalpTrade.sl;
      let trendReversal = isBuy ? m5Trend === "bearish" : m5Trend === "bullish";

      if(hitTp){
        signal = isBuy ? "BUY SCALP TP HIT" : "SELL SCALP TP HIT";
        entry = activeScalpTrade.entry;
        sl = activeScalpTrade.sl;
        tp = activeScalpTrade.tp;
        reason = "Target tercapai";
        status = "DONE";
        marketComment = "TP tercapai. Tunggu pullback berikutnya untuk entry baru.";
        pushHistory(activeScalpTrade, "TP HIT");
        activeScalpTrade = null;
      } else if(hitSl){
        signal = isBuy ? "BUY SCALP SL HIT" : "SELL SCALP SL HIT";
        entry = activeScalpTrade.entry;
        sl = activeScalpTrade.sl;
        tp = activeScalpTrade.tp;
        reason = "Stop loss tersentuh";
        status = "DONE";
        marketComment = "SL tersentuh. Tunggu setup ulang yang lebih rapi.";
        pushHistory(activeScalpTrade, "SL HIT");
        activeScalpTrade = null;
      } else if(trendReversal){
        signal = isBuy ? "BUY SCALP EXIT" : "SELL SCALP EXIT";
        entry = activeScalpTrade.entry;
        sl = activeScalpTrade.sl;
        tp = activeScalpTrade.tp;
        reason = "Trend berbalik, exit posisi";
        status = "DONE";
        marketComment = "Trend berbalik. Posisi ditutup untuk proteksi profit/risk.";
        pushHistory(activeScalpTrade, "EXIT");
        activeScalpTrade = null;
      } else {
        signal = isBuy ? "BUY SCALP" : "SELL SCALP";
        entry = activeScalpTrade.entry;
        sl = activeScalpTrade.sl;
        tp = activeScalpTrade.tp;
        reason = "Posisi aktif, menunggu TP/SL atau pergantian trend";
        status = "RUNNING";
        marketComment = "Posisi masih aktif. Pantau manajemen hingga TP/SL atau trend berubah.";
        scalpDebug = "ACTIVE " + activeScalpTrade.side + " | Menunggu TP/SL/Exit";
      }
    }

    if(!activeScalpTrade && !spikeOk){
      reason = "Spike candle >" + mode.maxCandleSize + " poin, skip entry";
      marketComment = "Terdeteksi candle spike besar. Kemungkinan ada berita tiba-tiba, jangan masuk sekarang. Tunggu candle normal.";
    } else if(!activeScalpTrade && !emaGapOk && !allowByPullback){
      reason = "EMA gap terlalu jauh, market overextended";
      marketComment = "EMA20 dan EMA50 terlalu jauh terpisah. Market sudah overextended, tunggu pullback lebih dalam ke area EMA20 atau konsolidasi.";
    } else if(!activeScalpTrade && !htfReady){
      reason = "Data H1/M30 masih dikumpulkan";
      marketComment = "Data timeframe besar masih dikumpulkan. Tunggu H1 dan M30 siap sebelum entry.";
    } else if(!activeScalpTrade && m5Trend === "bullish" && !htfBullAligned){
      reason = "H1/M30 belum searah bullish";
      marketComment = "Trend kecil bullish, tapi H1 dan M30 belum sama-sama bullish. Tunggu alignment naik.";
    } else if(!activeScalpTrade && m5Trend === "bearish" && !htfBearAligned){
      reason = "H1/M30 belum searah bearish";
      marketComment = "Trend kecil bearish, tapi H1 dan M30 belum sama-sama bearish. Tunggu alignment turun.";
    } else if(!activeScalpTrade && m5Trend === "bullish" && !inDemandZone){
      reason = "Harga belum masuk demand zone";
      marketComment = "Trend bullish terdeteksi. Fokus entry buy di sekitar demand " + fix(demandTop) + " setelah buyer bereaksi.";
    } else if(!activeScalpTrade && m5Trend === "bearish" && !inSupplyZone){
      reason = "Harga belum masuk supply zone";
      marketComment = "Trend bearish terdeteksi. Fokus entry sell di sekitar supply " + fix(supplyBottom) + " setelah seller bereaksi.";
    } else if(!activeScalpTrade && m5Trend === "bullish" && inDemandZone && !bullishOrderFlow){
      reason = "Belum ada reaksi order flow bullish di demand";
      marketComment = "Harga sudah di demand zone, tapi belum ada candle rejection bullish yang valid. Tunggu reaksi buyer lebih jelas.";
    } else if(!activeScalpTrade && m5Trend === "bearish" && inSupplyZone && !bearishOrderFlow){
      reason = "Belum ada reaksi order flow bearish di supply";
      marketComment = "Harga sudah di supply zone, tapi belum ada candle rejection bearish yang valid. Tunggu reaksi seller lebih jelas.";
    } else if(!activeScalpTrade && m5Trend === "bullish" && inDemandZone && nearEmaForBuy && bullishOrderFlow){
      // BUY SCALP: trend bullish + harga di demand + order flow bullish
      entry = last;
      sl    = entry - mode.risk;
      tp    = entry + mode.risk * mode.rr;
      signal = "BUY SCALP";
      reason = "Trend bullish + demand zone + order flow bullish";
      status = "VALID";
      marketComment = "Harga masuk demand zone lalu muncul reaksi order flow bullish. Entry buy searah trend dengan konfirmasi buyer.";
      activeScalpTrade = {side: "BUY", entry, sl, tp};
    } else if(!activeScalpTrade && m5Trend === "bearish" && inSupplyZone && nearEmaForSell && bearishOrderFlow){
      // SELL SCALP: trend bearish + harga di supply + order flow bearish
      entry = last;
      sl    = entry + mode.risk;
      tp    = entry - mode.risk * mode.rr;
      signal = "SELL SCALP";
      reason = "Trend bearish + supply zone + order flow bearish";
      status = "VALID";
      marketComment = "Harga masuk supply zone lalu muncul reaksi order flow bearish. Entry sell searah trend dengan konfirmasi seller.";
      activeScalpTrade = {side: "SELL", entry, sl, tp};
    } else if(!activeScalpTrade) {
      reason = "Menunggu sinkron trend + SND + order flow";
      marketComment = m5Trend === "bullish"
        ? "Trend bullish aktif. Tunggu harga masuk demand zone lalu rejection bullish untuk BUY SCALP."
        : "Trend bearish aktif. Tunggu harga masuk supply zone lalu rejection bearish untuk SELL SCALP.";
    }
  }

  // ===== NORMAL ENTRY (Sweep + BOS + Rejection) =====
  else if(status !== "FILTER" && strategyMode === "NORMAL"){

    if(trend==="bearish" && sweepHigh && bearishReject && bosDown && bearishMomentum && trendStrongEnough){
      entry = (recentHigh + emaFast)/2;
      sl    = recentHigh + mode.slBuffer;
      let risk = Math.abs(entry-sl);
      tp    = entry - risk*mode.rr;
      signal = "SELL LIMIT";
      reason = "Trend turun + sweep + BOS + rejection + momentum";
      status = "VALID";
      marketComment = "Setup bearish terkonfirmasi multi-filter. Tunggu retrace ke zona entry sebelum eksekusi.";
    }
    else if(trend==="bullish" && sweepLow && bullishReject && bosUp && bullishMomentum && trendStrongEnough){
      entry = (recentLow + emaFast)/2;
      sl    = recentLow - mode.slBuffer;
      let risk = Math.abs(entry-sl);
      tp    = entry + risk*mode.rr;
      signal = "BUY LIMIT";
      reason = "Trend naik + sweep + BOS + rejection + momentum";
      status = "VALID";
      marketComment = "Setup bullish terkonfirmasi multi-filter. Tunggu retrace ke zona entry sebelum eksekusi.";
    }
    else {
      marketComment = trend === "bullish"
        ? "Trend bullish, setup belum valid (sweep/BOS/rejection belum sinkron). Sabar tunggu konfirmasi."
        : "Trend bearish, setup belum valid (sweep/BOS/rejection belum sinkron). Sabar tunggu konfirmasi.";
    }
  }

  // ===== LOT + MANAGEMENT =====
  let lot="-", manage="WAIT";

  if(entry !== null){
    let risk = Math.abs(entry - sl);
    lot = calcLot(risk);
    let profit = Math.abs(last - entry);

    if(strategyMode === "SCALPING"){
      // Management scalping: poin absolut
      if(profit >= 15) manage="MOVE BE";
      if(profit >= 30) manage="CLOSE PARTIAL";
      if(profit >= 50) manage="HOLD RUNNER";
    } else {
      // Management normal: berbasis risk ratio
      if(profit > risk)       manage="MOVE BE";
      if(profit > risk*1.5)   manage="CLOSE PARTIAL";
      if(profit > risk*2)     manage="HOLD RUNNER";
    }
  }

  // ===== OUTPUT =====
  let cls = signal.includes("BUY")?"buy":signal.includes("SELL")?"sell":"wait";

  document.getElementById("signal").className=cls;
  document.getElementById("signal").innerText=signal;
  setMetric("entry", entry === null ? entryLabel : "Entry", entry === null ? (plannedEntry === null ? "Belum ada setup" : fix(plannedEntry)) : fix(entry), entry === null && plannedEntry === null);
  setMetric("tp","TP", tp === null ? "Belum ada setup" : fix(tp), tp === null);
  setMetric("sl","SL", sl === null ? "Belum ada setup" : fix(sl), sl === null);
  setMetric("lot","Lot", lot === "-" ? "-" : lot, lot === "-");
  setMetric("status","Status", status, status !== "VALID");
  setMetric("reason","Alasan", reason, signal === "NO TRADE");
  setMetric("scalpDebug", "SND/OF", scalpDebug, strategyMode !== "SCALPING");
  setMetric("manage","Manajemen", manage, manage === "WAIT");
  document.getElementById("marketComment").innerText=formatModeComment(marketComment);
}

// ===== LOOP =====
setSourceLabel("Menunggu feed...");
renderModeButtons();
renderHistory();
// Pre-populate historical M5 bars so M5 collection is instant on any browser,
// then start the live polling loop.
(async () => {
  await initHistoricalData();
  load();
  setInterval(load, 3000);
})();

</script>
